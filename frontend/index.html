<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Self-RAG Chat</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-header">
          <button type="button" id="new-chat-btn" class="btn-new-chat">+ New chat</button>
        </div>
        <nav id="thread-list" class="thread-list" aria-label="Recent chats"></nav>
      </aside>

      <main class="chat-main">
        <header class="chat-header">
          <h1 id="chat-title">New chat</h1>
          <p id="status-line" class="status-line" aria-live="polite"></p>
        </header>

        <div id="messages" class="messages" role="log" aria-live="polite"></div>

        <form id="chat-form" class="chat-form">
          <textarea
            id="question-input"
            rows="1"
            placeholder="Message Self-RAG..."
            autocomplete="off"
            required
          ></textarea>
          <button type="submit" id="send-btn" class="btn-send">Send</button>
        </form>
      </main>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
